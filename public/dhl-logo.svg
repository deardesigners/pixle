<?xml version="1.0" encoding="UTF-8"?>
<!--
  Placeholder DHL-like mark — простая аппроксимация для разработки.
  Замени файлом public/dhl-logo.png (или своим SVG) и поменяй путь
  в lib/dhlBranded.ts → DHL_LOGO_URL когда будет финальный логотип.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" preserveAspectRatio="xMidYMid meet">
  <g fill="#D40511">
    <!-- Левые полоски -->
    <rect x="0"  y="86"  width="80" height="10" />
    <rect x="0"  y="100" width="80" height="10" />
    <rect x="0"  y="114" width="80" height="10" />
    <!-- Текст DHL: тяжёлый bold italic, наклон ~12° -->
    <text
      x="100"
      y="142"
      font-family="Arial Black, Helvetica, sans-serif"
      font-size="120"
      font-weight="900"
      font-style="italic"
      letter-spacing="-4"
    >DHL</text>
    <!-- Правые полоски -->
    <rect x="520" y="86"  width="80" height="10" />
    <rect x="520" y="100" width="80" height="10" />
    <rect x="520" y="114" width="80" height="10" />
  </g>
</svg>
